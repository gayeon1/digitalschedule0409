<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>민준이의 행성 디지털 일과표</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
        }

        body { 
            background-image: url('https://images.pexels.com/photos/9263901/pexels-photo-9263901.jpeg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            box-sizing: border-box;
            gap: 40px;
        }
        
        .main-title { 
            color: white; font-size: 2.8rem; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            margin: 0;
        }

        .selector-container {
            display: flex; align-items: center; justify-content: center;
            width: 100%;
            padding: 20px 0;
        }

        .planet-selector { 
            display: flex; flex-direction: row; flex-wrap: nowrap; 
            align-items: center; justify-content: center;
            gap: 2vw; padding: 40px 60px; 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); 
            border-radius: 120px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .planet-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 100px; flex-shrink: 0; }
        
        .p-circle { 
            width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; 
            animation: rotateImg 15s linear infinite; animation-play-state: paused; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
            background-position: center; background-repeat: no-repeat; background-color: #000; 
            transition: transform 0.3s;
        }

        .p-mercury { background-image: url('https://i.namu.wiki/i/xNeEG5xnD3HB2IxUuv10NAto-GLuFaWz4GwiI0909JTeKXecAc-z-325nOvYfIx8a8bZFHIMTXHXYf52tUZCoN6WKvfdl22GA0dt5PF1PnwTMYYoeaofefDw_IihjN9uOU8HoMmrFsn9nYa84YWMnA.webp'); background-size: 115%; }
        .p-venus { background-image: url('https://cf-images.ap-southeast-2.prod.boltdns.net/v1/static/664969388001/2ae03679-5f47-4fba-a983-80deba634e38/8e915729-9a08-4705-ae3e-11fb2112c21a/640x360/match/image.jpg'); background-size: 200%; background-position: 50% center; }
        .p-earth { background-image: url('https://images.pexels.com/photos/30596274/pexels-photo-30596274.jpeg'); background-size: 245%; background-position: 56% center; }
        .p-mars { background-image: url('https://images.pexels.com/photos/12498801/pexels-photo-12498801.jpeg'); background-size: 205%; background-position: 57% center; }
        .p-jupiter { background-image: url('https://images.pexels.com/photos/20337602/pexels-photo-20337602.jpeg'); background-size: 190%; background-position: 57% center; }
        .saturn-container { background-color: transparent !important; box-shadow: none !important; overflow: visible !important; position: relative; }
        .saturn-img { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 130px; z-index: 10; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); transition: transform 0.3s; }
        .p-uranus { background-image: url('https://images.pexels.com/photos/20337595/pexels-photo-20337595.jpeg'); background-size: 210%; background-position: 56% center; }

        .planet-btn:hover .p-circle { animation-play-state: running; transform: scale(1.2); }
        .planet-btn:hover .saturn-img { transform: translate(-50%, -50%) scale(1.2); }

        .day-label { font-size: 1.3rem; font-weight: bold; color: white; text-shadow: 2px 2px 5px black; white-space: nowrap; }

        .bottom-info-bar { display: flex; gap: 40px; width: 100%; justify-content: center; margin-top: 20px; }
        .info-trigger-btn { width: 260px; padding: 20px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); border: 3px solid #ffd700; border-radius: 30px; color: white; cursor: pointer; text-align: center; }
        .info-trigger-btn h3 { margin: 0; font-size: 1.6rem; color: #ffd700; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 1000; justify-content: center; align-items: center; }
        .pizza-box { position: relative; width: 85vh; height: 85vh; max-width: 650px; max-height: 650px; border-radius: 50%; border: 12px solid #ffd700; background: white; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); overflow: hidden; }
        .home-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: black; color: #ffd700; border: 5px solid #ffd700; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; }
        .slice { cursor: pointer; stroke: #fff; stroke-width: 0.5; }
        
        .slice-text { fill: black; font-weight: 900; pointer-events: none; text-anchor: middle; font-size: 5px; }
        .subject-text { font-size: 6.2px !important; fill: #000; }
        /* 기상, 집 전용 왕글씨 스타일 */
        .big-text { font-size: 12px !important; fill: #000; }

        .detail-modal { background: white; width: 500px; padding: 30px; border-radius: 40px; border: 8px solid #ffd700; text-align: center; position: relative; }
        .video-container { width: 100%; height: 280px; background: #000; margin: 20px 0; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        #modal-content { font-size: 1.8rem; font-weight: 900; margin: 20px 0; color: #000; }
        .close-btn { padding: 12px 50px; cursor: pointer; background: black; color: #ffd700; border: none; border-radius: 20px; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }
        #info-list { text-align: left; font-size: 1.5rem; line-height: 2; margin: 20px 0; padding-left: 40px; font-weight: bold; }

        @keyframes rotateImg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-title">🚀 민준이의 우주 디지털 일과표</div>
    
    <div class="selector-container">
        <div class="planet-selector">
            <div class="planet-btn" onclick="openPizza('월요일')"><div class="p-circle p-mercury"></div><div class="day-label">월요일</div></div>
            <div class="planet-btn" onclick="openPizza('화요일')"><div class="p-circle p-venus"></div><div class="day-label">화요일</div></div>
            <div class="planet-btn" onclick="openPizza('수요일')"><div class="p-circle p-earth"></div><div class="day-label">수요일</div></div>
            <div class="planet-btn" onclick="openPizza('목요일')"><div class="p-circle p-mars"></div><div class="day-label">목요일</div></div>
            <div class="planet-btn" onclick="openPizza('금요일')"><div class="p-circle p-jupiter"></div><div class="day-label">금요일</div></div>
            <div class="planet-btn" onclick="openPizza('토요일')">
                <div class="p-circle saturn-container"><img src="https://static.vecteezy.com/system/resources/thumbnails/047/084/126/small/saturn-planet-on-transparent-background-png.png" class="saturn-img"></div>
                <div class="day-label" style="margin-top:5px">토요일</div>
            </div>
            <div class="planet-btn" onclick="openPizza('일요일')"><div class="p-circle p-uranus"></div><div class="day-label">일요일</div></div>
        </div>
    </div>

    <div class="bottom-info-bar">
        <div class="info-trigger-btn" onclick="openInfoPopup('supplies')"><h3>🎒 내일 준비물</h3></div>
        <div class="info-trigger-btn" onclick="openInfoPopup('notice')"><h3>📢 알림장</h3></div>
    </div>

    <div id="schedule-page" class="modal-overlay">
        <div style="text-align: center;">
            <h2 id="schedule-title" style="color: #ffd700; font-size: 2.5rem; margin-bottom: 20px;"></h2>
            <div class="pizza-box">
                <div class="home-btn" onclick="closePizza()">HOME</div>
                <svg viewBox="0 0 200 200" id="pizza-svg" style="width: 100%; height: 100%; transform: rotate(-90deg);"></svg>
            </div>
        </div>
    </div>

    <div id="info-modal" class="modal-overlay"><div class="detail-modal" style="width: 450px;"><h2 id="info-title" style="color:#b8860b"></h2><ul id="info-list"></ul><button class="close-btn" onclick="closeInfoPopup()">닫기</button></div></div>
    
    <div id="msg-modal" class="modal-overlay" style="z-index: 2000;">
        <div class="detail-modal">
            <h2 id="modal-title" style="font-size: 2.2rem; color:#000;"></h2>
            <div class="video-container" id="video-area" style="color: #fff;"></div>
            <p id="modal-content"></p>
            <button class="close-btn" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        const videoLinks = {
            "국어": "주소넣기", "수학": "주소넣기", "사회": "주소넣기", "과학": "주소넣기",
            "영어": "주소넣기", "체육": "주소넣기", "음악": "주소넣기", "미술": "주소넣기",
            "실과": "주소넣기", "도덕": "주소넣기", "창체": "주소넣기", "점심시간": "주소넣기",
            "감각치료": "주소넣기", "쉬는시간": "주소넣기"
        };

        const infoData = {
            supplies: { title: "🎒 내일 준비물", list: ["필통과 알림장", "수학 익힘책", "개인 물병"] },
            notice: { title: "📢 알림장", list: ["수학 숙제 24쪽까지", "부모님 확인 받아오기", "차 조심해서 등교하기"] }
        };

        const subjectMessages = {
            "국어": "선생님: 오늘의 주제는 뭘까?", "수학": "선생님: 자, 교과서 펴자!", "사회": "선생님: 우리 마을을 알아볼까?",
            "과학": "선생님: 신기한 실험을 해보자!", "영어": "Teacher: Hello, everyone!", "체육": "선생님: 운동장에서 뛰놀자!",
            "음악": "선생님: 아름다운 노래를 불러요", "미술": "선생님: 멋지게 그려보자!", "실과": "선생님: 스스로 만들어봐요",
            "도덕": "선생님: 바른 마음을 가져요", "창체": "선생님: 즐거운 특별 활동 시간!"
        };

        function createSchoolDay(subjects, afterSchool) {
            return [
                { s: 0, e: 8, label: "기상", full: "기상", color: "#e3f2fd", msg: "꿈나라 여행 후 기상", noVideo: true, isBig: true },
                { s: 8, e: 8.33, label: "세면", full: "세면", color: "#bbdefb", msg: "깨끗하게 세수해요~", noVideo: true },
                { s: 8.33, e: 8.66, label: "등교", full: "등교", color: "#90caf9", msg: "학교로 출발해요~", noVideo: true },
                { s: 8.66, e: 9, label: "조례", full: "아침 조례", color: "#b3e5fc", msg: "선생님: 좋은 아침이야", noVideo: true },
                { s: 9, e: 9.66, label: subjects[0], full: "1교시 : " + subjects[0], color: "#ffcdd2", isSub: true, msg: subjectMessages[subjects[0]], videoKey: subjects[0] },
                { s: 9.66, e: 9.83, label: "", full: "쉬는 시간", color: "#ffffff", msg: "다음 수업을 준비해요", noVideo: true },
                { s: 9.83, e: 10.5, label: subjects[1], full: "2교시 : " + subjects[1], color: "#fff9c4", isSub: true, msg: subjectMessages[subjects[1]], videoKey: subjects[1] },
                { s: 10.5, e: 10.66, label: "", full: "쉬는 시간", color: "#ffffff", msg: "친구들과 즐겁게 쉬어요", videoKey: "쉬는시간" },
                { s: 10.66, e: 11.33, label: subjects[2], full: "3교시 : " + subjects[2], color: "#c8e6c9", isSub: true, msg: subjectMessages[subjects[2]], videoKey: subjects[2] },
                { s: 11.33, e: 11.5, label: "", full: "쉬는 시간", color: "#ffffff", msg: "물을 마시거나 화장실에 다녀와요", noVideo: true },
                { s: 11.5, e: 12.16, label: subjects[3], full: "4교시 : " + subjects[3], color: "#b2dfdb", isSub: true, msg: subjectMessages[subjects[3]], videoKey: subjects[3] },
                { s: 12.16, e: 13, label: "점심", full: "점심시간", color: "#ffccbc", msg: "맛있는 급식 시간", isSub: true, videoKey: "점심시간" },
                { s: 13, e: 13.66, label: subjects[4], full: "5교시 : " + subjects[4], color: "#d1c4e9", isSub: true, msg: subjectMessages[subjects[4]], videoKey: subjects[4] },
                { s: 13.66, e: 13.83, label: "", full: "쉬는 시간", color: "#ffffff", msg: "잠시 기지개를 켜볼까?", noVideo: true },
                { s: 13.83, e: 14.5, label: subjects[5] || subjects[4], full: "6교시 : " + (subjects[5] || subjects[4]), color: "#d1c4e9", isSub: true, msg: subjectMessages[subjects[5] || subjects[4]], videoKey: subjects[5] || subjects[4] },
                { s: 14.5, e: 15, label: "하교", full: "하교", color: "#cfd8dc", msg: "조심히 집으로 가요", noVideo: true },
                { s: 15, e: 17, label: afterSchool.label, full: afterSchool.full, color: "#b3e5fc", msg: afterSchool.msg, videoKey: afterSchool.label === "감각치료" ? "감각치료" : null, noVideo: afterSchool.noVideo },
                { s: 17, e: 18, label: "집으로", full: "집으로", color: "#dcedc8", msg: "부모님과 집으로", noVideo: true },
                { s: 18, e: 24, label: "집", full: "집 활동", color: "#f5f5f5", msg: "즐거운 저녁 시간", noVideo: true, isBig: true }
            ];
        }

        const schedules = {
            "월요일": createSchoolDay(["국어", "수학", "사회", "체육", "미술", "미술"], {label: "감각치료", full: "감각치료", msg: "치료사 선생님과 함께해요", noVideo: false}),
            "화요일": createSchoolDay(["수학", "과학", "음악", "국어", "실과", "실과"], {label: "운동", full: "오후 운동", msg: "건강하게 운동해요", noVideo: true}),
            "수요일": createSchoolDay(["영어", "수학", "국어", "사회", "도덕", ""], {label: "감각치료", full: "감각치료", msg: "선생님과 집중 치료", noVideo: false}),
            "목요일": createSchoolDay(["과학", "영어", "체육", "수학", "국어", "국어"], {label: "감각치료", full: "감각치료", msg: "선생님과 집중 치료", noVideo: true}),
            "금요일": createSchoolDay(["음악", "사회", "수학", "영어", "창체", "창체"], {label: "감각치료", full: "감각치료", msg: "즐거운 감각 놀이 시간", noVideo: false}),
            "토요일": [{ s: 0, e: 24, label: "휴식", full: "토요일 휴식", color: "#f5f5f5", msg: "가족과 함께 쉬는 날", noVideo: true, isBig: true }],
            "일요일": [{ s: 0, e: 24, label: "휴식", full: "일요일 휴식", color: "#f5f5f5", msg: "내일을 준비하며 쉬는 날", noVideo: true, isBig: true }]
        };

        function openPizza(day) {
            const data = schedules[day];
            document.getElementById('schedule-title').innerText = day + " 일과표";
            const svg = document.getElementById('pizza-svg');
            svg.innerHTML = ''; 
            if(data) data.forEach(task => svg.appendChild(createSlice(task)));
            document.getElementById('schedule-page').style.display = 'flex';
        }

        function createSlice(task) {
            const sA = (task.s / 24) * 360, eA = (task.e / 24) * 360;
            const diff = eA - sA;
            const x1 = 100 + 100 * Math.cos(Math.PI * sA / 180), y1 = 100 + 100 * Math.sin(Math.PI * sA / 180);
            const x2 = 100 + 100 * Math.cos(Math.PI * eA / 180), y2 = 100 + 100 * Math.sin(Math.PI * eA / 180);
            const largeArc = diff > 180 ? 1 : 0;
            const d = `M 100 100 L ${x1} ${y1} A 100 100 0 ${largeArc} 1 ${x2} ${y2} Z`;
            
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d); path.setAttribute("fill", task.color); path.setAttribute("class", "slice");
            
            path.onclick = () => {
                document.getElementById('modal-title').innerText = task.full;
                document.getElementById('modal-content').innerText = task.msg || "즐거운 시간 보내세요!";
                const vArea = document.getElementById('video-area');
                if(task.noVideo) { vArea.style.display = 'none'; } 
                else { 
                    vArea.style.display = 'flex';
                    const link = videoLinks[task.videoKey];
                    vArea.innerHTML = (link && link !== "주소넣기") ? `<iframe src="${link}" allowfullscreen></iframe>` : `<span>🎥 영상 준비 중입니다</span>`;
                }
                document.getElementById('msg-modal').style.display = 'flex';
            };

            const tA = sA + diff / 2;
            const tx = 100 + 72 * Math.cos(Math.PI * tA / 180), ty = 100 + 72 * Math.sin(Math.PI * tA / 180);
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", tx); text.setAttribute("y", ty);
            
            if(task.isBig) text.setAttribute("class", "slice-text big-text");
            else if(task.isSub) text.setAttribute("class", "slice-text subject-text");
            else text.setAttribute("class", "slice-text");
            
            text.textContent = (diff < 1.5) ? "" : task.label; 
            text.setAttribute("transform", `rotate(${tA + 90}, ${tx}, ${ty})`);
            
            g.appendChild(path); g.appendChild(text); 
            return g;
        }

        function openInfoPopup(type) {
            const data = infoData[type];
            document.getElementById('info-title').innerText = data.title;
            document.getElementById('info-list').innerHTML = data.list.map(i => `<li>${i}</li>`).join('');
            document.getElementById('info-modal').style.display = 'flex';
        }
        function closeInfoPopup() { document.getElementById('info-modal').style.display = 'none'; }
        function closePizza() { document.getElementById('schedule-page').style.display = 'none'; }
        function closeModal() { document.getElementById('video-area').innerHTML = ''; document.getElementById('msg-modal').style.display = 'none'; }
    </script>
</body>
</html>
